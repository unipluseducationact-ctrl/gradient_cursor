<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gradient on Map — Interactive</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
  <style>
    :root {
      --bg: #f0f4f8;
      --panel: #ffffff;
      --border: #c5d0dc;
      --text: #1a2b3c;
      --muted: #5a6f82;
      --accent: #2563eb;
      --warn: #b45309;
      --map-fill: #e2e8f0;
      --contour: #1e293b;
      --page-pad: 12px;
      --gap: 12px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      padding: var(--page-pad);
      overflow: hidden; /* keep entire page visible without scrolling */
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin: 0 0 10px; /* title is the only spacing exception */
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: var(--gap);
      width: 100%;
      max-width: none;
      margin: 0 auto;
      height: calc(100vh - (2 * var(--page-pad))); /* viewport minus equal page padding */
    }
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(4, 1fr);
      }
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      display: flex;
      flex-direction: column;
      min-height: 0; /* allow inner content to shrink in grid */
    }
    .panel h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 0 0 0.5rem;
    }
    .svg-wrap {
      width: 100%;
      aspect-ratio: 520 / 400;
      flex: 1;
      min-height: 0;
    }
    .svg-wrap svg { width: 100%; height: 100%; display: block; }
    .triangle-wrap {
      width: 100%;
      aspect-ratio: 400 / 320;
      flex: 1;
      min-height: 0;
    }
    .triangle-wrap svg { width: 100%; height: 100%; display: block; }
    .bottom { display: contents; } /* flatten into the main 2x2 grid */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }
    .row {
      display: grid;
      grid-template-columns: 140px 1fr 72px;
      align-items: center;
      gap: 0.5rem;
    }
    .row label { font-size: 0.88rem; color: var(--text); }
    .row input[type="range"] { width: 100%; }
    .row input[type="number"] {
      width: 100%;
      padding: 0.35rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    button {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
    }
    button.primary { background: var(--accent); color: #fff; }
    button.primary:hover { filter: brightness(1.08); }
    button.secondary { background: #e2e8f0; color: var(--text); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .calc {
      font-size: 0.95rem;
    }
    .calc .line {
      margin: 0.35rem 0;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      background: #f8fafc;
      border-left: 3px solid var(--accent);
    }
    .calc .line strong { color: var(--accent); }
    .calc .katex-ish { font-family: "Cambria Math", "Times New Roman", serif; }
    .tri-hit {
      stroke: transparent;
      stroke-width: 18;
      fill: transparent;
      cursor: pointer;
      pointer-events: stroke;
    }
    #hit-theta {
      pointer-events: all;
      stroke: transparent;
      fill: transparent;
    }
    .tri-real.is-selected { stroke-width: 4; }
    path.tri-real.is-selected { stroke-width: 4; }
    g.tri-real.is-selected path { stroke-width: 2.5; }
    g.tri-real.is-selected #lbl-theta { font-size: 15px; }
    .tri-real.is-hover { filter: drop-shadow(0 0 5px rgba(37, 99, 235, 0.35)); }
    line.tri-real.is-hover:not(.is-selected) { stroke-width: 3.5; }
    path.tri-real.is-hover:not(.is-selected) { stroke-width: 3.5; }
    #tri-labels text { pointer-events: none; }
    #lbl-vertical, #lbl-horizontal, #lbl-hyp { pointer-events: none; }
    .calc-empty {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 1rem;
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: 8px;
      margin: 0;
    }
    .calc-card {
      border-left: 4px solid var(--card-color, var(--accent));
      background: #f8fafc;
      border-radius: 8px;
      padding: 0.75rem 0.9rem;
      animation: cardIn 0.18s ease-out;
    }
    .calc-card .card-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      color: var(--card-color);
    }
    .calc-card .card-swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--card-color);
      flex-shrink: 0;
    }
    .calc-card .card-desc {
      color: var(--muted);
      font-size: 0.88rem;
      margin: 0.25rem 0 0.6rem;
    }
    .calc-card .card-formula {
      font-family: "Cambria Math", "Times New Roman", serif;
      margin: 0.25rem 0;
      font-size: 0.92rem;
    }
    .calc-card .card-result {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.55rem;
      margin-top: 0.4rem;
      font-weight: 700;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: none; }
    }
    #warning {
      color: var(--warn);
      font-size: 0.88rem;
      margin-top: 0.35rem;
      min-height: 1.2em;
    }
    .callout {
      pointer-events: none;
      font-size: 11px;
      font-weight: 600;
      fill: #0f172a;
    }
    .callout-bg {
      fill: #fef3c7;
      stroke: #f59e0b;
      stroke-width: 1;
      rx: 4;
    }
    #ruler-group { opacity: 0; }
    #anim-dot { opacity: 0; }

    /* ─────────────────────────────────────────────
       14. DRAWING (overlay)
       ───────────────────────────────────────────── */
    #drawCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 10000;
      pointer-events: none; /* do not block UI when inactive */
      opacity: 0;
    }
    #drawCanvas.active {
      pointer-events: auto;
      opacity: 1;
      /* iPad / Safari: avoid text selection and long-press taking over slow strokes */
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    body.draw-mode-active {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    #drawFab {
      position: fixed;
      right: 18px;
      top: 18px;
      bottom: auto;
      z-index: 10002;
      width: 54px;
      height: 54px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #fff;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.14);
      user-select: none;
    }
    #drawFab.active-draw {
      background: #b91c1c;
    }
    #drawToolbar {
      position: fixed;
      right: 18px;
      top: 84px;
      bottom: auto;
      z-index: 10002;
      width: min(320px, calc(100vw - 36px));
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(255,255,255,.14);
      color: #fff;
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
      display: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #drawToolbar.active {
      display: block;
    }
    #drawToolbar .draw-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 8px 0;
    }
    #drawToolbar .draw-label {
      font-size: 0.85rem;
      color: rgba(255,255,255,.86);
      white-space: nowrap;
    }
    #drawToolbar .color-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #drawToolbar .color-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.35);
      cursor: pointer;
      padding: 0;
      background: transparent;
    }
    #drawToolbar .color-dot.active {
      border-color: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,.18);
    }
    #drawToolbar input[type="range"] {
      flex: 1;
      min-width: 120px;
    }
    #drawClearBtn {
      background: rgba(255,255,255,.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,.16);
      padding: 0.4rem 0.65rem;
      border-radius: 10px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="grid">
    <div class="panel">
      <h2>Map (plan view)</h2>
      <div class="svg-wrap">
        <svg id="map-svg" viewBox="0 0 520 400" xmlns="http://www.w3.org/2000/svg" aria-label="Contour map">
          <defs>
            <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="b" />
              <feOffset dx="1" dy="1" />
              <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>
          </defs>
          <rect width="520" height="400" fill="#fafafa" stroke="#cbd5e1" />
          <text x="260" y="22" text-anchor="middle" font-size="13" fill="#64748b">Contour map</text>

          <!-- Nested contours (outer = index 0) -->
          <g id="hill-shade" opacity="0.35">
            <ellipse cx="268" cy="210" rx="198" ry="152" fill="#94a3b8" />
            <ellipse cx="272" cy="208" rx="155" ry="118" fill="#cbd5e1" />
            <ellipse cx="275" cy="205" rx="112" ry="85" fill="#e2e8f0" />
            <ellipse cx="278" cy="202" rx="72" ry="55" fill="#f1f5f9" />
            <ellipse cx="280" cy="200" rx="38" ry="28" fill="#f8fafc" />
          </g>

          <g id="contours" fill="none" stroke="var(--contour)" stroke-width="1.8" stroke-linejoin="round">
            <path id="ring-0" class="contour-ring" d="M268 58 C380 58 466 144 466 210 C466 290 380 362 268 362 C156 362 70 290 70 210 C70 130 156 58 268 58 Z" />
            <path id="ring-1" class="contour-ring" d="M270 92 C360 92 430 158 430 212 C430 272 360 328 270 328 C180 328 110 272 110 212 C110 152 180 92 270 92 Z" />
            <path id="ring-2" class="contour-ring" d="M272 124 C345 124 398 172 398 214 C398 256 345 298 272 298 C199 298 146 256 146 214 C146 172 199 124 272 124 Z" />
            <path id="ring-3" class="contour-ring" d="M274 152 C328 152 368 186 368 216 C368 246 328 276 274 276 C220 276 180 246 180 216 C180 186 220 152 274 152 Z" />
            <path id="ring-4" class="contour-ring" d="M276 178 C310 178 338 198 338 218 C338 238 310 256 276 256 C242 256 214 238 214 218 C214 198 242 178 276 178 Z" />
          </g>

          <g id="contour-labels" font-size="12" fill="#0f172a" font-weight="700"></g>

          <line id="line-ab" x1="118" y1="248" x2="292" y2="168" stroke="#0f172a" stroke-width="2" stroke-linecap="round" />

          <g id="pt-b" transform="translate(118,248)">
            <line x1="-6" y1="-6" x2="6" y2="6" stroke="#b91c1c" stroke-width="2" />
            <line x1="-6" y1="6" x2="6" y2="-6" stroke="#b91c1c" stroke-width="2" />
            <text x="0" y="-14" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">B</text>
          </g>
          <g id="pt-a" transform="translate(292,168)">
            <line x1="-6" y1="-6" x2="6" y2="6" stroke="#15803d" stroke-width="2" />
            <line x1="-6" y1="6" x2="6" y2="-6" stroke="#15803d" stroke-width="2" />
            <text x="0" y="-14" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">A</text>
          </g>

          <!-- Ruler (animated) -->
          <g id="ruler-group" transform="translate(0,0)">
            <g id="ruler-rot">
              <rect x="-7" y="-14" width="14" height="28" fill="#f59e0b" opacity="0.9" rx="2" />
              <rect id="ruler-body" x="0" y="-12" width="180" height="24" fill="#fff" stroke="#334155" stroke-width="1.5" rx="2" />
              <g id="ruler-ticks" fill="#334155" font-size="7" font-family="monospace"></g>
            </g>
          </g>

          <g id="map-callout" opacity="0"></g>

          <text x="24" y="382" font-size="11" fill="#475569" id="scale-text-map">Scale 1 : 10 000</text>
          <text x="380" y="382" font-size="11" fill="#64748b">sea level</text>
          <rect id="scale-bar-map" x="24" y="388" width="80" height="6" fill="#334155" rx="1" />
        </svg>
      </div>
    </div>

    <div class="panel">
      <h2>Side view (gradient triangle)</h2>
      <div class="triangle-wrap">
        <svg id="tri-svg" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg" aria-label="Right triangle">
          <rect width="400" height="320" fill="#fafafa" />

          <g id="tri-geom" transform="translate(20, 12)">
            <!-- C left, B right, A top — AB vertical, BC horizontal -->
            <path id="tri-hyp" class="tri-real" data-el="AC" d="" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" />
            <line id="tri-leg-h" class="tri-real" data-el="BC" x1="0" y1="0" x2="0" y2="0" stroke="#2563eb" stroke-width="2.5" />
            <line id="tri-leg-v" class="tri-real" data-el="AB" x1="0" y1="0" x2="0" y2="0" stroke="#15803d" stroke-width="2.5" />

            <path id="tri-right-sq" d="" fill="none" stroke="#64748b" stroke-width="1.2" />

            <g id="tri-labels">
              <text id="lbl-a" x="0" y="0" font-size="14" font-weight="700">A</text>
              <text id="lbl-a-h" x="0" y="0" font-size="12" font-weight="700" fill="#15803d" opacity="0"></text>
              <text id="lbl-b" x="0" y="0" font-size="14" font-weight="700">B</text>
              <text id="lbl-b-h" x="0" y="0" font-size="12" font-weight="700" fill="#b91c1c" opacity="0"></text>
              <text id="lbl-c" x="0" y="0" font-size="14" font-weight="700">C</text>
            </g>

            <g id="tri-theta-real" class="tri-real" data-el="theta">
              <path id="tri-arc" d="" fill="none" stroke="#7c3aed" stroke-width="1.5" />
              <text id="lbl-theta" x="0" y="0" font-size="13" fill="#7c3aed" text-anchor="middle" dominant-baseline="central">θ</text>
            </g>

            <text id="lbl-vertical" x="0" y="0" font-size="11" fill="#15803d" font-weight="600">
              <tspan id="lbl-v-line1">Vertical distance</tspan>
              <tspan id="lbl-v-line2" x="0" dy="13"></tspan>
            </text>
            <text id="lbl-horizontal" x="0" y="0" font-size="11" fill="#2563eb" font-weight="600" text-anchor="middle">Horizontal distance</text>
            <text id="lbl-hyp" x="0" y="0" font-size="11" fill="#0f172a" font-weight="600" text-anchor="middle" dominant-baseline="middle">Inclined plane</text>

            <circle id="anim-dot" r="5" fill="#f59e0b" stroke="#fff" stroke-width="2" />

            <g id="tri-layer-hits">
              <line id="hit-hyp" class="tri-hit" data-el="AC" x1="0" y1="0" x2="0" y2="0" />
              <line id="hit-leg-h" class="tri-hit" data-el="BC" x1="0" y1="0" x2="0" y2="0" />
              <line id="hit-leg-v" class="tri-hit" data-el="AB" x1="0" y1="0" x2="0" y2="0" />
              <circle id="hit-theta" class="tri-hit" data-el="theta" cx="0" cy="0" r="0" />
            </g>
          </g>
        </svg>
      </div>
    </div>

    <div class="bottom">
      <div class="panel">
        <h2>Inputs</h2>
        <div class="controls">
          <div class="row">
            <label for="lowest">Lowest contour (m)</label>
            <input type="range" id="lowest-r" min="0" max="500" step="10" value="50" />
            <input type="number" id="lowest" min="0" max="500" step="10" value="50" />
          </div>
          <div class="row">
            <label for="highest">Highest contour (m)</label>
            <input type="range" id="highest-r" min="100" max="1000" step="10" value="250" />
            <input type="number" id="highest" min="100" max="1000" step="10" value="250" />
          </div>
          <div class="row">
            <label for="interval">Contour interval (m)</label>
            <input type="range" id="interval-r" min="50" max="250" step="50" value="50" />
            <input type="number" id="interval" min="50" max="250" step="50" value="50" />
          </div>
          <div class="row">
            <label for="scaleN">Scale 1 : n</label>
            <input type="range" id="scaleN-r" min="500" max="10000" step="500" value="10000" />
            <input type="number" id="scaleN" min="500" max="10000" step="500" value="10000" />
          </div>
          <div class="row">
            <label for="mapLen">Map length AB (cm)</label>
            <input type="range" id="mapLen-r" min="1" max="20" step="0.5" value="5" />
            <input type="number" id="mapLen" min="1" max="20" step="0.5" value="5" />
          </div>
        </div>
        <div id="warning"></div>
        <div class="actions">
          <button type="button" class="secondary" id="btn-reset">Reset</button>
        </div>
      </div>

      <div class="panel">
        <h2>Calculations</h2>
        <div class="calc" id="calc-detail">
          <p class="calc-empty">Click <strong>AB</strong>, <strong>BC</strong>, <strong>AC</strong>, or the angle <strong>θ</strong> on the triangle to view that element's calculation.</p>
        </div>
        <div class="calc" id="calc-anim" style="display:none; margin-top:0.75rem;">
          <p style="font-size:0.85rem;color:var(--muted);margin:0 0 0.35rem;">Animation steps:</p>
          <div class="line" id="ac-1"></div>
          <div class="line" id="ac-2"></div>
          <div class="line" id="ac-3"></div>
          <div class="line" id="ac-4"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ─────────────────────────────────────────────
       14. DRAWING (overlay)
       ───────────────────────────────────────────── -->
  <canvas id="drawCanvas"></canvas>
  <div id="drawToolbar" aria-label="Drawing tools">
    <div class="draw-row">
      <div class="draw-label">Tool</div>
      <div style="display:flex; gap:8px; align-items:center; flex:1; justify-content:flex-end;">
        <button id="drawToolPen" type="button" style="background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.16);padding:0.35rem 0.6rem;border-radius:10px;font-weight:800;" onclick="setDrawTool('pen')">Pen</button>
        <button id="drawToolHi" type="button" style="background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.16);padding:0.35rem 0.6rem;border-radius:10px;font-weight:800;" onclick="setDrawTool('highlighter')">Highlighter</button>
      </div>
    </div>
    <div class="draw-row">
      <div class="draw-label">Color</div>
      <div class="color-dots" role="group" aria-label="Drawing color">
        <!-- Pen palette -->
        <button type="button" class="color-dot active" data-tool="pen" style="background:#ffffff" onclick="setDrawColor('#fff', this)" aria-label="White"></button>
        <button type="button" class="color-dot" data-tool="pen" style="background:#22c55e" onclick="setDrawColor('#22c55e', this)" aria-label="Green"></button>
        <button type="button" class="color-dot" data-tool="pen" style="background:#2563eb" onclick="setDrawColor('#2563eb', this)" aria-label="Blue"></button>
        <button type="button" class="color-dot" data-tool="pen" style="background:#f59e0b" onclick="setDrawColor('#f59e0b', this)" aria-label="Orange"></button>
        <button type="button" class="color-dot" data-tool="pen" style="background:#ef4444" onclick="setDrawColor('#ef4444', this)" aria-label="Red"></button>
        <button type="button" class="color-dot" data-tool="pen" style="background:#0f172a" onclick="setDrawColor('#0f172a', this)" aria-label="Black"></button>

        <!-- Highlighter palette (light tones) -->
        <button type="button" class="color-dot" data-tool="highlighter" hidden style="background:#86efac" onclick="setDrawColor('#86efac', this)" aria-label="Light green"></button>
        <button type="button" class="color-dot" data-tool="highlighter" hidden style="background:#fde68a" onclick="setDrawColor('#fde68a', this)" aria-label="Light yellow"></button>
        <button type="button" class="color-dot" data-tool="highlighter" hidden style="background:#fdba74" onclick="setDrawColor('#fdba74', this)" aria-label="Light orange"></button>
      </div>
    </div>
    <div class="draw-row">
      <div class="draw-label" id="drawWidthLabel">Width</div>
      <input id="drawWidth" type="range" min="1" max="18" step="1" value="3" aria-label="Line width" />
      <button id="drawClearBtn" type="button" onclick="clearDraw()">Clear</button>
    </div>
  </div>
  <button id="drawFab" type="button" onclick="toggleDraw()" aria-label="Toggle drawing">🖊️</button>

  <script>
    if (typeof gsap !== "undefined" && typeof MotionPathPlugin !== "undefined") {
      gsap.registerPlugin(MotionPathPlugin);
    }

    const MAX_RINGS = 5;
    const mapSvg = document.getElementById("map-svg");
    const lineAB = document.getElementById("line-ab");

    const rulerGroup = document.getElementById("ruler-group");
    const rulerRot = document.getElementById("ruler-rot");

    const rulerTicks = document.getElementById("ruler-ticks");

    const scaleTextMap = document.getElementById("scale-text-map");
    const scaleBarMap = document.getElementById("scale-bar-map");

    const triLegH = document.getElementById("tri-leg-h");
    const hitHyp = document.getElementById("hit-hyp");
    const hitLegH = document.getElementById("hit-leg-h");
    const hitLegV = document.getElementById("hit-leg-v");
    const hitTheta = document.getElementById("hit-theta");
    const triThetaReal = document.getElementById("tri-theta-real");
    const triRightSq = document.getElementById("tri-right-sq");

    const lblA = document.getElementById("lbl-a");
    const lblAH = document.getElementById("lbl-a-h");
    const lblB = document.getElementById("lbl-b");
    const lblBH = document.getElementById("lbl-b-h");

    const lblVertical = document.getElementById("lbl-vertical");
    const lblVLine2 = document.getElementById("lbl-v-line2");
    const lblHorizontal = document.getElementById("lbl-horizontal");

    const btnReset = document.getElementById("btn-reset");
    const calcDetail = document.getElementById("calc-detail");

    let selectedEl = null;
    let abFxTl = null;

    function getContourLabelEl(levelNumber) {
      if (!contourLabelG || !isFinite(levelNumber)) return null;
      const sel = `text.contour-label[data-level="${String(levelNumber)}"]`;
      return contourLabelG.querySelector(sel);
    }

    function hideTriangleHeights() {
      if (lblAH) { lblAH.textContent = ""; lblAH.setAttribute("opacity", "0"); }
      if (lblBH) { lblBH.textContent = ""; lblBH.setAttribute("opacity", "0"); }
    }

    function runABClickFX(s) {
      if (!s) return;
      const c = compute(s);
      const hi = isFinite(c.levelA) ? c.levelA : +s.highest;
      const lo = isFinite(c.levelB) ? c.levelB : +s.lowest;
      const tHi = getContourLabelEl(hi);
      const tLo = getContourLabelEl(lo);

      if (typeof gsap !== "undefined") {
        if (abFxTl) { abFxTl.kill(); abFxTl = null; }
        gsap.killTweensOf([tHi, tLo, lblAH, lblBH]);
      }

      // Always refresh text before animation.
      if (lblAH) lblAH.textContent = `(${fmt(hi, 0)} m)`;
      if (lblBH) lblBH.textContent = `(${fmt(lo, 0)} m)`;

      const canAnimate = typeof gsap !== "undefined";
      if (!canAnimate) {
        // Fallback: show briefly without animation.
        if (lblAH) lblAH.setAttribute("opacity", "1");
        if (lblBH) lblBH.setAttribute("opacity", "1");
        setTimeout(() => hideTriangleHeights(), 900);
        return;
      }

      const pulseOne = (el, color) => {
        if (!el) return;
        gsap.fromTo(
          el,
          { scale: 1, fill: el.getAttribute("fill") || "#0f172a" },
          {
            scale: 1.25,
            fill: color,
            duration: 0.18,
            yoyo: true,
            repeat: 1,
            ease: "power2.out",
            transformOrigin: "50% 50%",
          }
        );
      };

      pulseOne(tHi, "#15803d");
      pulseOne(tLo, "#b91c1c");

      abFxTl = gsap.timeline({ defaults: { ease: "power2.out" } });
      abFxTl
        .set([lblAH, lblBH], { opacity: 0, x: -4 })
        .to([lblAH, lblBH], { opacity: 1, x: 0, duration: 0.22 }, 0.05)
        .to([lblAH, lblBH], { opacity: 0, duration: 0.22 }, "+=0.7")
        .add(() => hideTriangleHeights());
    }

    const EMPTY_CALC_HTML =
      `<p class="calc-empty">Click <strong>AB</strong>, <strong>BC</strong>, <strong>AC</strong>, or the angle <strong>θ</strong> on the triangle to view that element's calculation.</p>`;

    const inputs = {
      lowest: document.getElementById("lowest"),
      highest: document.getElementById("highest"),
      interval: document.getElementById("interval"),
      scaleN: document.getElementById("scaleN"),
      mapLen: document.getElementById("mapLen"),
    };
    const ranges = {
      lowest: document.getElementById("lowest-r"),
      highest: document.getElementById("highest-r"),
      interval: document.getElementById("interval-r"),
      scaleN: document.getElementById("scaleN-r"),
      mapLen: document.getElementById("mapLen-r"),
    };

    const LOWEST_MIN = 0;
    const LOWEST_MAX = 500;
    const HIGHEST_MIN = 100;
    const HIGHEST_MAX = 1000;
    const ELEV_STEP = 10;
    const INTERVAL_MIN = 50;
    const INTERVAL_MAX = 250;
    const SCALE_MIN = 500;
    const SCALE_MAX = 10000;
    const SCALE_STEP = 500;
    const MAPLEN_MIN = 1;
    const MAPLEN_MAX = 20;

    const HIGHEST_K_MIN = 2;
    const HIGHEST_K_MAX = 5;

    function clamp(n, lo, hi) {
      return Math.min(hi, Math.max(lo, n));
    }

    function snapLowestToGrid(rawLowest, interval) {
      const v = Number(rawLowest);
      const intv = Number(interval);
      if (!isFinite(v) || !isFinite(intv) || intv <= 0) {
        return clamp(v, LOWEST_MIN, LOWEST_MAX);
      }
      const minAllowed = Math.ceil(LOWEST_MIN / intv) * intv;
      const maxAllowed = Math.floor(LOWEST_MAX / intv) * intv;
      const snapped = Math.round(v / intv) * intv;
      return clamp(snapped, minAllowed, maxAllowed);
    }

    function snapIntervalVal(v) {
      const snapped = Math.round(Number(v) / 50) * 50;
      return clamp(snapped, INTERVAL_MIN, INTERVAL_MAX);
    }

    function snapScaleVal(v) {
      const snapped = Math.round(Number(v) / SCALE_STEP) * SCALE_STEP;
      return clamp(snapped, SCALE_MIN, SCALE_MAX);
    }

    function roundMapLenVal(v) {
      return clamp(Math.round(Number(v) * 2) / 2, MAPLEN_MIN, MAPLEN_MAX);
    }

    function snapHighestToGrid(rawHighest, lowest, interval) {
      if (!isFinite(rawHighest) || !isFinite(lowest) || !isFinite(interval) || interval <= 0) {
        return clamp(rawHighest, HIGHEST_MIN, HIGHEST_MAX);
      }
      const minHi = lowest + HIGHEST_K_MIN * interval;
      const maxHi = lowest + HIGHEST_K_MAX * interval;
      const hi = clamp(rawHighest, minHi, maxHi);
      const k = clamp(Math.round((hi - lowest) / interval), HIGHEST_K_MIN, HIGHEST_K_MAX);
      return lowest + k * interval;
    }

    function updateLowestConstraints(interval) {
      const intv = isFinite(interval) && interval > 0 ? interval : ELEV_STEP;
      const min = Math.ceil(LOWEST_MIN / intv) * intv;
      const max = Math.floor(LOWEST_MAX / intv) * intv;
      inputs.lowest.step = String(intv);
      ranges.lowest.step = String(intv);
      inputs.lowest.min = String(min);
      ranges.lowest.min = String(min);
      inputs.lowest.max = String(max);
      ranges.lowest.max = String(max);
    }

    function updateHighestConstraints(lowest, interval) {
      const step = isFinite(interval) && interval > 0 ? interval : ELEV_STEP;
      const min =
        isFinite(lowest) && isFinite(interval) && interval > 0
          ? lowest + HIGHEST_K_MIN * interval
          : HIGHEST_MIN;
      const max =
        isFinite(lowest) && isFinite(interval) && interval > 0
          ? lowest + HIGHEST_K_MAX * interval
          : HIGHEST_MAX;

      inputs.highest.step = String(step);
      ranges.highest.step = String(step);
      inputs.highest.min = String(min);
      ranges.highest.min = String(min);
      inputs.highest.max = String(max);
      ranges.highest.max = String(max);
    }

    function clampElevations() {
      const intv = snapIntervalVal(inputs.interval.value);
      updateLowestConstraints(intv);
      let lo = snapLowestToGrid(+inputs.lowest.value, intv);
      let hi = snapHighestToGrid(+inputs.highest.value, lo, intv);

      updateHighestConstraints(lo, intv);

      // If the user changes lowest/interval so current highest is invalid,
      // snap it to the nearest valid contour level (k = 2..5).
      hi = snapHighestToGrid(hi, lo, intv);

      inputs.lowest.value = lo;
      inputs.highest.value = hi;
      ranges.lowest.value = lo;
      ranges.highest.value = hi;
    }

    function normalizeAllInputs() {
      const intv = snapIntervalVal(inputs.interval.value);
      inputs.interval.value = intv;
      ranges.interval.value = intv;
      clampElevations();
      const sc = snapScaleVal(inputs.scaleN.value);
      inputs.scaleN.value = sc;
      ranges.scaleN.value = sc;
      const ml = roundMapLenVal(inputs.mapLen.value);
      inputs.mapLen.value = ml;
      ranges.mapLen.value = ml;
    }

    function gcd(a, b) {
      a = Math.abs(Math.round(a));
      b = Math.abs(Math.round(b));
      while (b) { const t = b; b = a % b; a = t; }
      return a || 1;
    }

    function fmt(n, d = 2) {
      if (!isFinite(n)) return "—";
      if (Number.isInteger(n)) return String(n);
      return Number(n).toFixed(d);
    }

    function parseTranslateXY(transform) {
      if (typeof transform !== "string") return null;
      // Accept both `translate(x,y)` and `translate(x y)`; allow other transforms before/after.
      const m = transform.match(/translate\(\s*([-\d.]+)(?:\s*,\s*|\s+)([-\d.]+)\s*\)/i);
      if (!m) return null;
      const x = Number(m[1]);
      const y = Number(m[2]);
      if (!isFinite(x) || !isFinite(y)) return null;
      return { x, y };
    }

    function getTranslatePoint(el) {
      if (!el) return null;
      return parseTranslateXY(el.getAttribute("transform") || "");
    }

    const __path2dCache = new Map();
    let __hitTestCtx = null;
    let __path2dSvgSupported = null; // null = unknown, boolean after first check
    const __ringPolyCache = new Map(); // key: ring id (e.g. "ring-2") -> Array<{x:number,y:number}>

    function getHitTestCtx() {
      if (__hitTestCtx) return __hitTestCtx;
      const canvas = document.createElement("canvas");
      canvas.width = 520;
      canvas.height = 400;
      __hitTestCtx = canvas.getContext("2d");
      return __hitTestCtx;
    }

    function detectPath2DSvgSupport() {
      if (__path2dSvgSupported !== null) return __path2dSvgSupported;
      try {
        // SVG path data parsing in Path2D is not universally supported; detect once.
        // If this throws, we permanently disable the Path2D(d) hit-test path.
        // eslint-disable-next-line no-new
        new Path2D("M0 0 L1 0 L1 1 Z");
        __path2dSvgSupported = true;
      } catch {
        __path2dSvgSupported = false;
      }
      return __path2dSvgSupported;
    }

    function pointInPolygon(x, y, poly) {
      // Ray casting algorithm: returns true if point is inside polygon.
      let inside = false;
      for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
        const xi = poly[i].x, yi = poly[i].y;
        const xj = poly[j].x, yj = poly[j].y;
        const intersect =
          ((yi > y) !== (yj > y)) &&
          (x < (xj - xi) * (y - yi) / ((yj - yi) || 1e-12) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function getRingPolygon(ringEl, samples = 220) {
      if (!ringEl) return null;
      const id = ringEl.id || "";
      if (__ringPolyCache.has(id)) return __ringPolyCache.get(id);
      if (typeof ringEl.getTotalLength !== "function" || typeof ringEl.getPointAtLength !== "function") return null;
      const len = ringEl.getTotalLength();
      if (!isFinite(len) || len <= 0) return null;
      const n = Math.max(24, Math.min(1200, Math.floor(samples)));
      const poly = [];
      for (let i = 0; i < n; i++) {
        const p = ringEl.getPointAtLength((i / n) * len);
        poly.push({ x: p.x, y: p.y });
      }
      __ringPolyCache.set(id, poly);
      return poly;
    }

    function isPointInPathD(d, x, y) {
      if (typeof d !== "string" || !d) return false;
      if (!isFinite(x) || !isFinite(y)) return false;
      if (!detectPath2DSvgSupport()) return false;
      const ctx = getHitTestCtx();
      if (!ctx) return false;
      try {
        let p = __path2dCache.get(d);
        if (!p) {
          p = new Path2D(d);
          __path2dCache.set(d, p);
        }
        return ctx.isPointInPath(p, x, y);
      } catch {
        // Sticky-disable: prevents intermittent behavior and forces the deterministic fallback.
        __path2dSvgSupported = false;
        __path2dCache.clear();
        return false;
      }
    }

    function bandLevelAtPoint(x, y, levels, show, lowest) {
      if (!isFinite(lowest)) return NaN;
      if (!Array.isArray(levels) || levels.length === 0 || show < 1) return NaN;
      const maxIdx = Math.min(show, levels.length) - 1;
      for (let i = maxIdx; i >= 0; i--) {
        const ring = document.getElementById("ring-" + i);
        const d = ring ? ring.getAttribute("d") : "";
        // Prefer Path2D hit-test when available; fall back to polygon containment.
        if (isPointInPathD(d, x, y)) return levels[i];
        const poly = ring ? getRingPolygon(ring) : null;
        if (poly && poly.length >= 3 && pointInPolygon(x, y, poly)) return levels[i];
      }
      return NaN;
    }

    function readState() {
      return {
        lowest: +inputs.lowest.value,
        highest: +inputs.highest.value,
        interval: +inputs.interval.value,
        scaleN: +inputs.scaleN.value,
        mapLenCm: +inputs.mapLen.value,
      };
    }

    /** @returns {{ ok: boolean, levels: number[], L: number, vertical: number, horizontal: number, gradient: number, thetaDeg: number, mapLenCm: number, scaleN: number, warnings: string[] }} */
    function compute(s) {
      const warnings = [];
      const { lowest, highest, interval, scaleN, mapLenCm } = s;
      if (highest <= lowest) warnings.push("Highest contour must be greater than lowest contour.");
      if (interval <= 0) warnings.push("Contour interval must be positive.");
      const diff = highest > lowest ? highest - lowest : 0;
      let L = 0;
      let levels = [];
      if (interval > 0 && diff > 0) {
        const rawK = diff / interval;
        const k = clamp(Math.round(rawK), HIGHEST_K_MIN, HIGHEST_K_MAX);
        if (!isFinite(rawK) || Math.abs(rawK - k) > 1e-10) {
          warnings.push("Highest contour is not aligned to the contour interval — snapping may be needed.");
        }
        L = k;
        // Contours include the lowest itself, then increase by the interval up to highest.
        for (let i = 0; i <= L; i++) levels.push(lowest + i * interval);
      }

      const show = Math.min(levels.length, MAX_RINGS);
      const pA = getTranslatePoint(ptA);
      const pB = getTranslatePoint(document.getElementById("pt-b"));
      const levelA = pA ? bandLevelAtPoint(pA.x, pA.y, levels, show, lowest) : NaN;
      const levelB = pB ? bandLevelAtPoint(pB.x, pB.y, levels, show, lowest) : NaN;

      if (!pB) warnings.push("Could not read point B position (transform parse failed).");
      if (!isFinite(levelA)) warnings.push("Could not determine contour band at point A.");
      if (!isFinite(levelB)) warnings.push("Could not determine contour band at point B.");

      // Vertical distance (rise) definition for this tool:
      // AB = (highest contour at A) − (lowest contour at B)
      const levelAForRise = highest;
      const levelBForRise = lowest;
      const verticalSigned = isFinite(levelAForRise) && isFinite(levelBForRise) ? (levelAForRise - levelBForRise) : NaN;
      const vertical = isFinite(verticalSigned) ? Math.abs(verticalSigned) : NaN;
      const horizontal = mapLenCm > 0 && scaleN > 0 ? (mapLenCm * scaleN) / 100 : 0;
      const gradient = horizontal > 0 ? vertical / horizontal : NaN;
      const thetaDeg = horizontal > 0 && vertical >= 0 ? (Math.atan(vertical / horizontal) * 180) / Math.PI : 0;

      return {
        ok: warnings.length === 0 && L <= MAX_RINGS && L >= 1 && highest > lowest,
        levels,
        L,
        vertical,
        verticalSigned,
        levelA,
        levelB,
        horizontal,
        gradient,
        thetaDeg,
        mapLenCm,
        scaleN,
        warnings,
      };
    }

    const CONTOUR_LABEL_FRAC = 0.82;
    const CONTOUR_LABEL_GAP_MAX = 36;

    function renderContourLabels(levels, L) {
      contourLabelG.innerHTML = "";
      const show = Math.min(Array.isArray(levels) ? levels.length : 0, MAX_RINGS);
      for (let i = 0; i < MAX_RINGS; i++) {
        const ring = document.getElementById("ring-" + i);
        if (i < show) {
          ring.style.display = "";
          ring.setAttribute("opacity", "1");
          const v = levels[i];
          const len = ring.getTotalLength();
          const mid = CONTOUR_LABEL_FRAC * len;
          const maxGap = Math.min(2 * mid, 2 * (len - mid)) * 0.98;
          const gap = Math.max(0, Math.min(CONTOUR_LABEL_GAP_MAX, maxGap));
          const d1 = mid - gap / 2;
          const d2 = len - mid - gap / 2;
          ring.style.strokeDasharray = `${d1} ${gap} ${d2}`;
          ring.style.strokeDashoffset = "0";

          const pt = ring.getPointAtLength(mid);
          const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
          t.classList.add("contour-label");
          t.dataset.level = String(v);
          t.setAttribute("x", String(pt.x));
          t.setAttribute("y", String(pt.y));
          t.setAttribute("text-anchor", "middle");
          t.setAttribute("dominant-baseline", "middle");
          t.setAttribute("font-weight", "700");
          t.textContent = v + "m";
          contourLabelG.appendChild(t);
        } else {
          ring.style.display = "none";
          ring.style.strokeDasharray = "";
          ring.style.strokeDashoffset = "";
        }
      }
    }

    /** Place A and line endpoint on innermost visible contour path (levels index show−1 when L ≤ 5). */
    function positionPtAOnContour(L) {
      const show = Math.min(L + 1, MAX_RINGS);
      if (show < 1) return;
      const ringPath = document.getElementById("ring-" + (show - 1));
      if (!ringPath || typeof ringPath.getTotalLength !== "function") return;
      const plen = ringPath.getTotalLength();
      if (plen <= 0) return;
      const PT_A_T = 0.22;
      const pt = ringPath.getPointAtLength(PT_A_T * plen);
      lineAB.setAttribute("x2", String(pt.x));
      lineAB.setAttribute("y2", String(pt.y));
      ptA.setAttribute("transform", `translate(${pt.x},${pt.y})`);
    }

    /** Place B and line start on outermost visible contour path (levels index 0). */
    function positionPtBOnContour(L) {
      const show = Math.min(L + 1, MAX_RINGS);
      if (show < 1) return;
      const ringPath = document.getElementById("ring-0");
      const ptBEl = document.getElementById("pt-b");
      if (!ringPath || !ptBEl || typeof ringPath.getTotalLength !== "function") return;
      const plen = ringPath.getTotalLength();
      if (plen <= 0) return;
      const PT_B_T = 0.60;
      const pt = ringPath.getPointAtLength(PT_B_T * plen);
      lineAB.setAttribute("x1", String(pt.x));
      lineAB.setAttribute("y1", String(pt.y));
      ptBEl.setAttribute("transform", `translate(${pt.x},${pt.y})`);
    }

    function renderTriangle(c) {
      const pad = 40;
      const maxW = 260;
      const maxH = 220;
      const v = c.vertical;
      const h = c.horizontal;

      /** SVG viewport (triangle group is translated horizontally by triGeomTx). */
      const triGeomTx = 20;
      const viewRight = 400;
      const viewEdgeMargin = 8;
      /** Base perpendicular gap from hypotenuse to “Inclined plane” label (px). */
      const hypoLabelMarginPx = 26;
      /** Max extra offset when hypotenuse is nearly vertical (small |ux|). */
      const hypoSteepExtraMaxPx = 30;
      /** Baseline gap under horizontal leg CB (positive = below Cy). */
      const horizBaselineBelowLegPx = 15;
      /** Horizontal gap between vertical leg AB and its label (outside the triangle). */
      const verticalLabelLegGapPx = 10;

      let bh = 80, bw = 160;
      if (v > 0 && h > 0) {
        const sGeom = Math.min(maxH / v, maxW / h);
        /* Keep “Vertical …” stacked text to the right of AB inside the viewport. */
        const estVerticalLabelPx = 108;
        const axCap = viewRight - viewEdgeMargin - triGeomTx - verticalLabelLegGapPx - estVerticalLabelPx;
        const sFit = (axCap - pad) / h;
        const s = Math.min(sGeom, sFit > 0 ? sFit : sGeom);
        bh = Math.max(40, Math.min(maxH, v * s));
        bw = Math.max(60, Math.min(maxW, h * s));
      } else if (v > 0) bh = Math.min(maxH, v * 0.5 + 40);
      else if (h > 0) bw = Math.min(maxW, h * 0.02 + 60);

      const Bx = pad + bw, By = pad + maxH;
      const Cx = pad, Cy = By;
      const Ax = Bx, Ay = By - bh;

      triLegV.setAttribute("x1", Ax); triLegV.setAttribute("y1", Ay);
      triLegV.setAttribute("x2", Bx); triLegV.setAttribute("y2", By);
      triLegH.setAttribute("x1", Cx); triLegH.setAttribute("y1", Cy);
      triLegH.setAttribute("x2", Bx); triLegH.setAttribute("y2", By);
      triHyp.setAttribute("d", `M ${Cx} ${Cy} L ${Ax} ${Ay}`);

      const sq = 14;
      triRightSq.setAttribute("d", `M ${Bx - sq} ${By} L ${Bx - sq} ${By - sq} L ${Bx} ${By - sq}`);

      const arcR = 28;
      const dxCA = Ax - Cx;
      const dyCA = Ay - Cy;
      const lenCA = Math.hypot(dxCA, dyCA);
      const uxCA = lenCA > 1e-6 ? dxCA / lenCA : 1;
      const uyCA = lenCA > 1e-6 ? dyCA / lenCA : 0;

      /* ∠ACB: circular arc at C from CB (+x) to CA (SVG A can pick wrong center; explicit sweep) */
      const angCA = Math.atan2(dyCA, dxCA);
      const arcSegs = 28;
      let arcD = "";
      for (let i = 0; i <= arcSegs; i++) {
        const t = i / arcSegs;
        const a = t * angCA;
        const px = Cx + arcR * Math.cos(a);
        const py = Cy + arcR * Math.sin(a);
        arcD += (i === 0 ? "M" : "L") + ` ${px} ${py}`;
      }
      triArc.setAttribute("d", arcD);

      lblA.setAttribute("x", Ax + 8); lblA.setAttribute("y", Ay + 4);
      lblB.setAttribute("x", Bx + 8); lblB.setAttribute("y", By + 4);
      lblC.setAttribute("x", Cx - 22); lblC.setAttribute("y", Cy + 4);
      if (lblAH) { lblAH.setAttribute("x", Ax + 24); lblAH.setAttribute("y", Ay + 4); }
      if (lblBH) { lblBH.setAttribute("x", Bx + 24); lblBH.setAttribute("y", By + 4); }

      /* θ at ∠ACB: bisector of CB and CA, offset with the arc */
      const dxCB = Bx - Cx;
      const dyCB = By - Cy;
      const lenCB = Math.hypot(dxCB, dyCB);
      const uxCB = lenCB > 1e-6 ? dxCB / lenCB : 1;
      const uyCB = lenCB > 1e-6 ? dyCB / lenCB : 0;
      let bx = uxCB + uxCA;
      let by = uyCB + uyCA;
      const blen = Math.hypot(bx, by);
      if (blen > 1e-6) {
        bx /= blen;
        by /= blen;
      }
      const thRadius = arcR + 13;
      lblTheta.setAttribute("x", Cx + bx * thRadius);
      lblTheta.setAttribute("y", Cy + by * thRadius);

      const vMidY = (Ay + By) / 2;
      /* Always to the right of AB; triangle width is clamped so this stays on-screen. */
      const vx = Ax + verticalLabelLegGapPx;
      lblVertical.setAttribute("x", String(vx));
      lblVertical.setAttribute("y", String(vMidY - 7));
      lblVLine2.setAttribute("x", String(vx));
      if (v > 0) {
        lblVLine2.textContent = `(${fmt(v, 0)} m)`;
        lblVLine2.setAttribute("dy", "13");
      } else {
        lblVLine2.textContent = "";
        lblVLine2.setAttribute("dy", "0");
      }
      lblHorizontal.setAttribute("x", String((Cx + Bx) / 2));
      lblHorizontal.setAttribute("y", String(Cy + horizBaselineBelowLegPx));
      /* “Inclined plane” on the exterior of AC (away from B), fixed perpendicular margin */
      const midHx = (Cx + Ax) / 2;
      const midHy = (Cy + Ay) / 2;
      let nx = -uyCA;
      let ny = uxCA;
      const toBdx = Bx - midHx;
      const toBdy = By - midHy;
      if (nx * toBdx + ny * toBdy > 0) {
        nx = -nx;
        ny = -ny;
      }
      /* Horizontal text stays readable: steep AC needs a larger perpendicular step (toward −x exterior). */
      const absUx = Math.abs(uxCA);
      const steepT = Math.max(0, 1 - absUx);
      const hypOff = hypoLabelMarginPx + steepT * hypoSteepExtraMaxPx;
      /* Slide along tangent less when steep—avoids creeping back toward the segment. */
      const alongTowardC = Math.min(28, 0.12 * lenCA) * (0.25 + 0.75 * absUx);
      const tx = -uxCA;
      const ty = -uyCA;
      let px = midHx + nx * hypOff + tx * alongTowardC;
      let py = midHy + ny * hypOff + ty * alongTowardC;
      py = Math.max(16, py);
      lblHyp.setAttribute("x", px);
      lblHyp.setAttribute("y", py);
      lblHorizontal.textContent = h > 0
        ? `Horizontal distance (${fmt(h, 1)} m)`
        : "Horizontal distance (scaled map length)";
      lblHyp.textContent = "Inclined plane";

      hitLegV.setAttribute("x1", Ax); hitLegV.setAttribute("y1", Ay);
      hitLegV.setAttribute("x2", Bx); hitLegV.setAttribute("y2", By);
      hitLegH.setAttribute("x1", Cx); hitLegH.setAttribute("y1", Cy);
      hitLegH.setAttribute("x2", Bx); hitLegH.setAttribute("y2", By);
      hitHyp.setAttribute("x1", Cx); hitHyp.setAttribute("y1", Cy);
      hitHyp.setAttribute("x2", Ax); hitHyp.setAttribute("y2", Ay);
      const thetaHitR = arcR + 22;
      hitTheta.setAttribute("cx", String(Cx));
      hitTheta.setAttribute("cy", String(Cy));
      hitTheta.setAttribute("r", String(thetaHitR));

      triHyp.dataset.path = `M ${Cx} ${Cy} L ${Ax} ${Ay}`;
    }

    /** Simplified rise : run (vertical : horizontal), e.g. 300 m : 1800 m → 1 : 6 */
    function simplifiedGradientRatio(verticalM, horizontalM) {
      if (!isFinite(verticalM) || verticalM <= 0 || !isFinite(horizontalM) || horizontalM <= 0) return "—";
      const vi = Math.max(1, Math.round(verticalM));
      const hi = Math.max(1, Math.round(horizontalM));
      const g = gcd(vi, hi);
      return `${vi / g} : ${hi / g}`;
    }

    const CARDS = {
      AB: (c, s) => {
        const a = s.highest;
        const b = s.lowest;
        const signed = a - b;
        return {
        color: "#15803d",
        title: "AB — Vertical distance",
          desc: "Difference between the highest contour (A) and the lowest contour (B).",
          formulas: ["AB = (highest contour at A) − (lowest contour at B)"],
          result: `${fmt(a, 0)} − ${fmt(b, 0)} = ${fmt(signed, 0)} m`,
        };
      },
      BC: (c, s) => ({
        color: "#2563eb",
        title: "BC — Horizontal distance",
        desc: "Measured map length scaled to ground distance.",
        formulas: [`BC = map length × scale = ${fmt(s.mapLenCm, 2)} cm × ${s.scaleN}`],
        result: `${fmt(s.mapLenCm, 2)} × ${s.scaleN} ÷ 100 = ${fmt(c.horizontal, 2)} m`,
      }),
      AC: (c, s) => {
        const v = c.vertical;
        const h = c.horizontal;
        const acLen = Math.hypot(v, h);
        const thRad = (c.thetaDeg * Math.PI) / 180;
        const sinT = Math.sin(thRad);
        const cosT = Math.cos(thRad);
        const viaSin = sinT > 1e-10 ? v / sinT : NaN;
        const viaCos = cosT > 1e-10 ? h / cosT : NaN;
        let result = `√(${fmt(v, 0)}² + ${fmt(h, 2)}²) = ${fmt(acLen, 2)} m`;
        if (isFinite(viaSin)) {
          result += `<div style="margin-top:0.35rem;font-weight:600">AB ÷ sin θ = ${fmt(v, 0)} ÷ ${fmt(sinT, 6)} ≈ ${fmt(viaSin, 2)} m</div>`;
        }
        if (isFinite(viaCos)) {
          result += `<div style="margin-top:0.35rem;font-weight:600">BC ÷ cos θ = ${fmt(h, 2)} ÷ ${fmt(cosT, 6)} ≈ ${fmt(viaCos, 2)} m</div>`;
        }
        return {
          color: "#0f172a",
          title: "AC — Inclined plane",
          desc: "Actual distance of the slope path.",
          formulas: [
            "AC = √(AB² + BC²) (Pythagoras)",
            "AC = AB ÷ sin θ",
            "AC = BC ÷ cos θ",
          ],
          result,
        };
      },
      theta: (c, s) => {
        const ratioStr = simplifiedGradientRatio(c.vertical, c.horizontal);
        const gradStr = isFinite(c.gradient) ? fmt(c.gradient, 6) : "—";
        const thStr = fmt(c.thetaDeg, 2);
        let result = "";
        if (isFinite(c.gradient) && c.horizontal > 0) {
          const ab = fmt(c.vertical, 0);
          const bc = fmt(c.horizontal, 2);
          result = [
            `gradient = AB ÷ BC`,
            `= ${ab} ÷ ${bc} = ${gradStr}`,
            `tan θ = ${gradStr}`,
            `θ = ${thStr}°`,
          ].map((line) => `<div>${line}</div>`).join("");
          if (ratioStr !== "—") {
            result += `<div style="margin-top:0.35rem;color:#475569;font-weight:600">rise : run = ${ratioStr}</div>`;
          }
        } else {
          result = "Set a positive map length and scale so BC &gt; 0 to compute gradient and θ.";
        }
        return {
          color: "#7c3aed",
          title: "θ — Inclination angle",
          desc: "Steepness of AC; gradient = tan θ.",
          formulas: ["gradient = tan θ = AB ÷ BC"],
          result,
        };
      },
    };

    function renderDetailCard(c, s) {
      if (!calcDetail) return;
      if (!selectedEl) {
        calcDetail.innerHTML = EMPTY_CALC_HTML;
        return;
      }
      const builder = CARDS[selectedEl];
      if (!builder) {
        calcDetail.innerHTML = EMPTY_CALC_HTML;
        return;
      }
      const card = builder(c, s);
      const formulasHtml = card.formulas.map((f) => `<div class="card-formula">${f}</div>`).join("");
      calcDetail.innerHTML = `
        <div class="calc-card" style="--card-color:${card.color}">
          <div class="card-title"><span class="card-swatch" aria-hidden="true"></span>${card.title}</div>
          <p class="card-desc">${card.desc}</p>
          ${formulasHtml}
          <div class="card-result">${card.result}</div>
        </div>`;
    }

    function applySelectionClasses() {
      document.querySelectorAll(".tri-real").forEach((el) => {
        const elName = el.getAttribute("data-el");
        el.classList.toggle("is-selected", selectedEl !== null && elName === selectedEl);
      });
    }

    function selectElement(name) {
      if (name === selectedEl) return;
      selectedEl = name;
      applySelectionClasses();
      if (name !== "AB") hideTriangleHeights();
      normalizeAllInputs();
      const s = readState();
      const c = compute(s);
      renderDetailCard(c, s);
    }

    function bindTriangleHits() {
      const pairs = [
        [hitLegV, triLegV],
        [hitLegH, triLegH],
        [hitHyp, triHyp],
        [hitTheta, triThetaReal],
      ];
      pairs.forEach(([hit, real]) => {
        if (!hit || !real) return;
        const elName = hit.dataset.el;
        if (!elName) return;
        hit.addEventListener("click", () => {
          selectElement(elName);
          if (elName === "AB") runABClickFX(readState());
          if (elName === "BC") runMapRulerMeasureAB();
        });
        hit.addEventListener("mouseenter", () => real.classList.add("is-hover"));
        hit.addEventListener("mouseleave", () => real.classList.remove("is-hover"));
      });
    }

    function positionRuler() {
      if (!rulerGroup || !rulerBody || !rulerTicks) return;
      const x1 = +lineAB.getAttribute("x1"), y1 = +lineAB.getAttribute("y1");
      const x2 = +lineAB.getAttribute("x2"), y2 = +lineAB.getAttribute("y2");
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.hypot(dx, dy);
      const ang = Math.atan2(dy, dx) * 180 / Math.PI;
      const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
      rulerGroup.setAttribute("transform", `translate(${cx},${cy}) rotate(${ang})`);
      rulerBody.setAttribute("width", Math.max(len, 40));
      rulerBody.setAttribute("x", -len / 2);
      rulerTicks.innerHTML = "";
      const ticks = Math.min(12, Math.max(1, Math.floor(len / 18)));
      for (let i = 0; i <= ticks; i++) {
        const px = -len / 2 + (i / ticks) * len;
        const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
        tick.setAttribute("x1", px); tick.setAttribute("x2", px);
        tick.setAttribute("y1", -10); tick.setAttribute("y2", 10);
        tick.setAttribute("stroke", "#334155");
        tick.setAttribute("stroke-width", i % 2 === 0 ? 1.2 : 0.6);
        rulerTicks.appendChild(tick);
      }
    }

    function render() {
      normalizeAllInputs();
      const s = readState();
      const c = compute(s);
      scaleTextMap.textContent = "Scale 1 : " + s.scaleN.toLocaleString();

      if (s.highest > s.lowest && c.L >= 1) {
        renderContourLabels(c.levels, c.L);
        positionPtBOnContour(c.L);
        positionPtAOnContour(c.L);
      } else {
        for (let i = 0; i < MAX_RINGS; i++) {
          const ring = document.getElementById("ring-" + i);
          ring.style.display = "none";
          ring.style.strokeDasharray = "";
          ring.style.strokeDashoffset = "";
        }
        contourLabelG.innerHTML = "";
      }

      renderTriangle(c);
      renderDetailCard(c, s);
      warningEl.textContent = c.warnings.join(" ");
      applySelectionClasses();
      positionRuler();

      return { s, c };
    }

    let mainTl = null;

    function killAnim() {
      if (mainTl) { mainTl.kill(); mainTl = null; }
      if (typeof gsap !== "undefined") {
        gsap.killTweensOf([
          rulerGroup, mapCallout, lineAB, triHyp, triLegV, triLegH, animDot, rulerBody,
          "#calc-anim .line",
          scaleTextMap, scaleBarMap,
          lblA, lblB, lblC, lblTheta, triArc, triRightSq, lblVertical, lblHorizontal, lblHyp,
        ]);
        gsap.set(rulerGroup, { opacity: 0 });
        gsap.set(mapCallout, { opacity: 0 });
        gsap.set(animDot, { opacity: 0 });
        gsap.set([lblA, lblB, lblC, lblTheta, triArc, triRightSq, lblVertical, lblHorizontal, lblHyp], { opacity: 1, clearProps: "transform" });
        if (scaleTextMap) gsap.set(scaleTextMap, { clearProps: "transform" });
        if (scaleBarMap) gsap.set(scaleBarMap, { clearProps: "transform" });
        gsap.set("#calc-anim .line", { clearProps: "all" });
      }
      const calcAnim = document.getElementById("calc-anim");
      if (calcAnim) calcAnim.style.display = "none";

      if (rulerBody) {
        rulerBody.setAttribute("stroke", "#334155");
        rulerBody.setAttribute("stroke-width", "1.5");
      }
      if (scaleTextMap) scaleTextMap.setAttribute("fill", "#475569");
      if (scaleBarMap) scaleBarMap.setAttribute("fill", "#334155");
      lineAB.setAttribute("stroke-dasharray", "");
      lineAB.setAttribute("stroke-dashoffset", "");
      triHyp.setAttribute("stroke-dasharray", "");
      triHyp.setAttribute("stroke-dashoffset", "");
      triLegV.setAttribute("stroke-dasharray", "");
      triLegH.setAttribute("stroke-dasharray", "");
    }

    function buildMapCallout(text) {
      if (!mapCallout) return;
      mapCallout.innerHTML = "";
      const fo = document.createElementNS("http://www.w3.org/2000/svg", "foreignObject");
      fo.setAttribute("x", "160"); fo.setAttribute("y", "60"); fo.setAttribute("width", "200"); fo.setAttribute("height", "40");
      fo.innerHTML = `<div xmlns="http://www.w3.org/1999/xhtml" style="background:#fef3c7;border:1px solid #f59e0b;border-radius:6px;padding:6px 10px;font:600 12px system-ui;color:#0f172a;">${text}</div>`;
      mapCallout.appendChild(fo);
    }

    function buildMapRulerMeasureABTimeline(s) {
      if (typeof gsap === "undefined") return null;
      if (!rulerGroup || !rulerBody || !mapCallout || !lineAB) return null;

      const ml = fmt(s.mapLenCm, 2);
      buildMapCallout("Length of AB on map ≈ " + ml + " cm");

      // Prepare initial visual state (render() must have already positioned ruler).
      gsap.set(rulerGroup, { opacity: 0 });
      gsap.set(mapCallout, { opacity: 0 });
      lineAB.setAttribute("stroke-dasharray", "8 4");
      lineAB.setAttribute("stroke-dashoffset", "0");

      const tl = gsap.timeline({
        onComplete: () => {
          gsap.set(rulerGroup, { opacity: 0 });
          gsap.set(mapCallout, { opacity: 0 });
          if (rulerBody) {
            rulerBody.setAttribute("stroke", "#334155");
            rulerBody.setAttribute("stroke-width", "1.5");
          }
          if (scaleTextMap) scaleTextMap.setAttribute("fill", "#475569");
          if (scaleBarMap) scaleBarMap.setAttribute("fill", "#334155");
          lineAB.setAttribute("stroke-dasharray", "");
          lineAB.setAttribute("stroke-dashoffset", "");
        },
      });

      const scalePulse = () => {
        const targets = [scaleTextMap, scaleBarMap].filter(Boolean);
        if (!targets.length) return;
        gsap.fromTo(
          targets,
          { scale: 1 },
          { scale: 1.08, duration: 0.18, yoyo: true, repeat: 1, ease: "power2.out", transformOrigin: "0% 100%" }
        );
        if (scaleTextMap) {
          gsap.fromTo(
            scaleTextMap,
            { fill: "#475569" },
            { fill: "#f59e0b", duration: 0.18, yoyo: true, repeat: 1, ease: "power2.out" }
          );
        }
        if (scaleBarMap) {
          gsap.fromTo(
            scaleBarMap,
            { fill: "#334155" },
            { fill: "#f59e0b", duration: 0.18, yoyo: true, repeat: 1, ease: "power2.out" }
          );
        }
      };

      tl
        .to(rulerGroup, { opacity: 1, duration: 0.5 })
        .to(rulerBody, { stroke: "#fbbf24", strokeWidth: 3, duration: 0.2 })
        .to(rulerBody, { stroke: "#334155", strokeWidth: 1.5, duration: 0.25 })
        .to(lineAB, { strokeDashoffset: -24, duration: 1.2, ease: "none", repeat: 1 })
        .to(mapCallout, { opacity: 1, duration: 0.4 }, "<0.6")
        // Let the viewer read the map distance first, then emphasize the scale.
        .add(scalePulse, "+=0.35")
        .to(rulerGroup, { opacity: 0, duration: 0.35 }, "+=0.3")
        .to(mapCallout, { opacity: 0, duration: 0.25 }, "<");

      return tl;
    }

    function runMapRulerMeasureAB() {
      killAnim();
      const { s } = render();
      const tl = buildMapRulerMeasureABTimeline(s);
      if (!tl) return;
      mainTl = tl;
    }

    function runAnimation() {
      killAnim();
      const { s, c } = render();
      if (!isFinite(c.gradient) || c.horizontal <= 0 || typeof gsap === "undefined") {
        warningEl.textContent = "Set a positive map length and scale to run the animation.";
        return;
      }

      if (btnAnimate) btnAnimate.disabled = true;

      const calcAnim = document.getElementById("calc-anim");
      if (calcAnim) calcAnim.style.display = "block";
      const ml = fmt(s.mapLenCm, 2);
      const vStr = fmt(c.vertical, 0);
      const hStr = fmt(c.horizontal, 2);
      const ratioAnim = simplifiedGradientRatio(c.vertical, c.horizontal);
      const th = fmt(c.thetaDeg, 2);

      document.getElementById("ac-1").textContent = "Measure AB on the map with the ruler → map length = " + ml + " cm.";
      document.getElementById("ac-2").textContent =
        "Vertical distance (rise) = (highest contour at A) − (lowest contour at B) = " + vStr + " m.";
      document.getElementById("ac-3").textContent = "Gradient = " + vStr + " ÷ " + hStr + " = " + fmt(c.gradient, 6) + "  →  simplified " + ratioAnim + " (vertical : horizontal)";
      document.getElementById("ac-4").textContent = "θ = arctan(gradient) = " + th + "°.";

      gsap.set("#calc-anim .line", { opacity: 0, x: -12 });

      const hypPath = triHyp.getAttribute("d");
      const lenHyp = triHyp.getTotalLength ? triHyp.getTotalLength() : 200;
      triHyp.setAttribute("stroke-dasharray", lenHyp);
      triHyp.setAttribute("stroke-dashoffset", lenHyp);
      const vLen = Math.hypot(+triLegV.getAttribute("x2") - +triLegV.getAttribute("x1"), +triLegV.getAttribute("y2") - +triLegV.getAttribute("y1"));
      const hLen = Math.hypot(+triLegH.getAttribute("x2") - +triLegH.getAttribute("x1"), +triLegH.getAttribute("y2") - +triLegH.getAttribute("y1"));
      triLegV.setAttribute("stroke-dasharray", vLen);
      triLegV.setAttribute("stroke-dashoffset", vLen);
      triLegH.setAttribute("stroke-dasharray", hLen);
      triLegH.setAttribute("stroke-dashoffset", hLen);

      lineAB.setAttribute("stroke-dasharray", "8 4");
      lineAB.setAttribute("stroke-dashoffset", "0");

      const pathForDot = hypPath;
      gsap.set(animDot, { opacity: 0, x: 0, y: 0 });
      // Make labels + right-angle appear while drawing (not after).
      gsap.set([lblA, lblB, lblC, lblTheta, triArc, triRightSq, lblVertical, lblHorizontal, lblHyp], { opacity: 0, clearProps: "transform" });

      mainTl = gsap.timeline({
        onComplete: () => { if (btnAnimate) btnAnimate.disabled = false; },
      });

      const mapRulerTl = buildMapRulerMeasureABTimeline(s);

      mainTl
        .add(mapRulerTl || undefined)
        .add(() => {
          if (pathForDot && typeof MotionPathPlugin !== "undefined") {
            gsap.set(animDot, { opacity: 1 });
            gsap.to(animDot, {
              duration: 1.4,
              ease: "power1.inOut",
              motionPath: { path: pathForDot, align: pathForDot, alignOrigin: [0.5, 0.5], autoRotate: false },
            });
          }
        })
        .to(triHyp, { strokeDashoffset: 0, duration: 1.2, ease: "power2.out" }, "<0.2")
        .to([lblC, lblTheta, triArc, lblHyp], { opacity: 1, duration: 0.3, ease: "power1.out" }, "<0.05")
        .to(lblA, { opacity: 1, duration: 0.25, ease: "power1.out" }, "<0.1")
        .to(triLegV, { strokeDashoffset: 0, duration: 0.8, ease: "power2.out" }, "-=0.5")
        .to(triRightSq, { opacity: 1, duration: 0.25, ease: "power1.out" }, "<0.05")
        .to(lblVertical, { opacity: 1, duration: 0.25, ease: "power1.out" }, "<0.05")
        .to(lblB, { opacity: 1, duration: 0.25, ease: "power1.out" }, "<0.05")
        .to(triLegH, { strokeDashoffset: 0, duration: 0.8, ease: "power2.out" }, "-=0.4")
        .to(lblHorizontal, { opacity: 1, duration: 0.25, ease: "power1.out" }, "<0.05")
        .to(animDot, { opacity: 0, duration: 0.3 }, "+=0.2")
        .to("#calc-anim .line", { opacity: 1, x: 0, duration: 0.45, stagger: 0.35, ease: "power2.out" }, "-=0.5");
    }

    Object.keys(inputs).forEach((key) => {
      inputs[key].addEventListener("input", () => {
        ranges[key].value = inputs[key].value;
        render();
      });
      ranges[key].addEventListener("input", () => {
        inputs[key].value = ranges[key].value;
        render();
      });
    });

    btnReset.addEventListener("click", () => {
      killAnim();
      selectedEl = null;
      inputs.lowest.value = 50;
      inputs.highest.value = 250;
      inputs.interval.value = 50;
      inputs.scaleN.value = 10000;
      inputs.mapLen.value = 5;
      Object.keys(ranges).forEach((k) => { ranges[k].value = inputs[k].value; });
      render();
    });

    if (btnAnimate) btnAnimate.addEventListener("click", runAnimation);
    bindTriangleHits();
    render();

    // ─────────────────────────────────────────────
    // 14. DRAWING
    // ─────────────────────────────────────────────
    const drawCanvas = document.getElementById('drawCanvas');
    const drawCtx = drawCanvas.getContext('2d');
    let drawActive = false, drawing = false;
    let drawToolbarOpen = false;
    let drawColor = '#fff', drawLineWidth = 3;
    let drawTool = 'pen';
    let drawHighlighterAlpha = 0.12;
    const HIGHLIGHTER_WIDTH_PX = 14;
    let drawDpr = Math.max(1, window.devicePixelRatio || 1);
    let lastPt = null;

    function setDrawTool(t) {
      drawTool = t === 'highlighter' ? 'highlighter' : 'pen';
      const penBtn = document.getElementById('drawToolPen');
      const hiBtn = document.getElementById('drawToolHi');
      if (penBtn) penBtn.style.background = drawTool === 'pen' ? 'rgba(255,255,255,.12)' : 'rgba(255,255,255,.06)';
      if (hiBtn) hiBtn.style.background = drawTool === 'highlighter' ? 'rgba(255,255,255,.12)' : 'rgba(255,255,255,.06)';

      const penDots = document.querySelectorAll('.color-dot[data-tool="pen"]');
      const hiDots = document.querySelectorAll('.color-dot[data-tool="highlighter"]');
      const showPen = drawTool === 'pen';
      penDots.forEach((b) => { b.hidden = !showPen; });
      hiDots.forEach((b) => { b.hidden = showPen; });

      // Pick a sane default color when switching tools.
      if (drawTool === 'highlighter') {
        const first = document.querySelector('.color-dot[data-tool="highlighter"]:not([hidden])') || document.querySelector('.color-dot[data-tool="highlighter"]');
        if (first) setDrawColor('#fde68a', first);
      } else {
        const first = document.querySelector('.color-dot[data-tool="pen"]:not([hidden])') || document.querySelector('.color-dot[data-tool="pen"]');
        if (first) setDrawColor('#fff', first);
      }

      const labelEl = document.getElementById('drawWidthLabel');
      const slider = document.getElementById('drawWidth');
      if (!slider) return;
      if (drawTool === 'highlighter') {
        if (labelEl) labelEl.textContent = 'Transparency';
        slider.min = '0';
        slider.max = '30';
        slider.step = '1';
        slider.value = String(Math.round((isFinite(drawHighlighterAlpha) ? drawHighlighterAlpha : 0.12) * 100));
        slider.setAttribute('aria-label', 'Highlighter transparency');
      } else {
        if (labelEl) labelEl.textContent = 'Width';
        slider.min = '1';
        slider.max = '18';
        slider.step = '1';
        slider.value = String(isFinite(drawLineWidth) ? drawLineWidth : 3);
        slider.setAttribute('aria-label', 'Line width');
      }
    }

    function getCanvasPointFromClient(clientX, clientY) {
      const rect = drawCanvas.getBoundingClientRect();
      const x = (clientX - rect.left) * (drawCanvas.width / rect.width);
      const y = (clientY - rect.top) * (drawCanvas.height / rect.height);
      return { x, y };
    }

    function syncDrawModeBodyClass() {
      document.body.classList.toggle('draw-mode-active', drawActive);
    }

    document.addEventListener(
      'selectstart',
      (e) => {
        if (drawActive) e.preventDefault();
      },
      true
    );

    function resizeDrawCanvas({ preserve = true } = {}) {
      const rect = drawCanvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      drawDpr = dpr;

      const targetW = Math.max(1, Math.round(rect.width * dpr));
      const targetH = Math.max(1, Math.round(rect.height * dpr));
      const sameSize = drawCanvas.width === targetW && drawCanvas.height === targetH;
      if (sameSize) return;

      let snapshot = null;
      if (preserve && drawCanvas.width > 0 && drawCanvas.height > 0) {
        snapshot = document.createElement('canvas');
        snapshot.width = drawCanvas.width;
        snapshot.height = drawCanvas.height;
        const sctx = snapshot.getContext('2d');
        if (sctx) sctx.drawImage(drawCanvas, 0, 0);
      }

      drawCanvas.width = targetW;
      drawCanvas.height = targetH;

      // Ensure 1 CSS px ≈ 1 unit for drawing ops.
      // (We already convert client coords to canvas pixels via getBoundingClientRect + width/height ratio.)
      drawCtx.setTransform(1, 0, 0, 1, 0, 0);

      if (snapshot) {
        // Map old bitmap into the new bitmap size.
        drawCtx.drawImage(snapshot, 0, 0, snapshot.width, snapshot.height, 0, 0, targetW, targetH);
      }
    }

    function toggleDraw() {
      // UX: tapping the button should collapse/expand the toolbar without disabling drawing.
      if (!drawActive) {
        drawActive = true;
        drawToolbarOpen = true;
        drawing = false;
        lastPt = null;
        drawCanvas.classList.add('active');
        resizeDrawCanvas({ preserve: false });
      } else {
        drawToolbarOpen = !drawToolbarOpen;
      }

      document.getElementById('drawToolbar').classList.toggle('active', drawToolbarOpen);
      document.getElementById('drawFab').classList.toggle('active-draw', drawActive);
      document.getElementById('drawFab').textContent = drawToolbarOpen ? '✕' : '🖊️';
      syncDrawModeBodyClass();
    }
    function setDrawColor(c, el) {
      drawColor = c;
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
      el.classList.add('active');
    }
    function clearDraw() {
      drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);

      // Clearing should also exit drawing mode so the rest of the UI works normally.
      drawActive = false;
      drawToolbarOpen = false;
      drawing = false;
      lastPt = null;
      drawCanvas.classList.remove('active');
      document.getElementById('drawToolbar').classList.remove('active');
      const fab = document.getElementById('drawFab');
      fab.classList.remove('active-draw');
      fab.textContent = '🖊️';
      syncDrawModeBodyClass();
    }

    const drawWidthEl = document.getElementById('drawWidth');
    if (drawWidthEl) {
      drawLineWidth = +drawWidthEl.value || drawLineWidth;
      drawWidthEl.addEventListener('input', () => {
        const v = +drawWidthEl.value;
        if (drawTool === 'highlighter') {
          drawHighlighterAlpha = isFinite(v) ? (v / 100) : drawHighlighterAlpha;
        } else {
          drawLineWidth = v || drawLineWidth;
        }
      });
    }

    window.addEventListener('resize', () => {
      if (!drawActive) return;
      resizeDrawCanvas({ preserve: true });
    });

    function applyDrawStyle() {
      drawCtx.strokeStyle = drawColor;
      drawCtx.globalAlpha = drawTool === 'highlighter' ? drawHighlighterAlpha : 1;
      drawCtx.lineWidth = drawTool === 'highlighter' ? HIGHLIGHTER_WIDTH_PX : drawLineWidth;
      drawCtx.lineCap = 'round';
      drawCtx.lineJoin = 'round';
    }

    function drawTo(clientX, clientY, { start = false } = {}) {
      const pt = getCanvasPointFromClient(clientX, clientY);
      if (start || !lastPt) {
        drawCtx.beginPath();
        drawCtx.moveTo(pt.x, pt.y);
      } else {
        drawCtx.lineTo(pt.x, pt.y);
        drawCtx.stroke();
      }
      lastPt = pt;
    }

    // Prefer Pointer Events for consistent mouse/touch/pencil behavior.
    if (window.PointerEvent) {
      drawCanvas.addEventListener('pointerdown', (e) => {
        if (!drawActive) return;
        e.preventDefault();
        resizeDrawCanvas({ preserve: true });
        drawCanvas.setPointerCapture?.(e.pointerId);
        drawing = true;
        lastPt = null;
        applyDrawStyle();
        drawTo(e.clientX, e.clientY, { start: true });
      });
      drawCanvas.addEventListener('pointermove', (e) => {
        if (!drawActive || !drawing) return;
        e.preventDefault();
        applyDrawStyle();
        drawTo(e.clientX, e.clientY);
      });
      const end = (e) => {
        if (!drawActive) return;
        if (e && typeof e.preventDefault === 'function') e.preventDefault();
        drawing = false;
        lastPt = null;
      };
      drawCanvas.addEventListener('pointerup', end);
      drawCanvas.addEventListener('pointercancel', end);
      /* Do not end stroke on pointerleave: iPadOS often fires leave at edges during drawing. */
    } else {
      // Fallback (older browsers): keep touch/mouse logic with proper coordinate mapping.
      drawCanvas.addEventListener('mousedown', (e) => {
        if (!drawActive) return;
        resizeDrawCanvas({ preserve: true });
        drawing = true;
        lastPt = null;
        applyDrawStyle();
        drawTo(e.clientX, e.clientY, { start: true });
      });
      drawCanvas.addEventListener('mousemove', (e) => {
        if (!drawActive || !drawing) return;
        applyDrawStyle();
        drawTo(e.clientX, e.clientY);
      });
      drawCanvas.addEventListener('mouseup', () => { drawing = false; lastPt = null; });
      drawCanvas.addEventListener('mouseleave', () => { drawing = false; lastPt = null; });
      drawCanvas.addEventListener('touchstart', (e) => {
        if (!drawActive) return;
        e.preventDefault();
        resizeDrawCanvas({ preserve: true });
        drawing = true;
        lastPt = null;
        applyDrawStyle();
        const t = e.touches[0];
        if (t) drawTo(t.clientX, t.clientY, { start: true });
      }, { passive: false });
      drawCanvas.addEventListener('touchmove', (e) => {
        if (!drawActive || !drawing) return;
        e.preventDefault();
        applyDrawStyle();
        const t = e.touches[0];
        if (t) drawTo(t.clientX, t.clientY);
      }, { passive: false });
      drawCanvas.addEventListener('touchend', () => { drawing = false; lastPt = null; });
      drawCanvas.addEventListener('touchcancel', () => { drawing = false; lastPt = null; });
    }
  </script>
</body>
</html>
